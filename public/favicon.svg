<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro con esquinas redondeadas -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Área de relleno bajo la línea -->
  <path d="M4 26 L10 19 L17 22 L26 9 L26 26 Z" fill="#10b981" opacity="0.15"/>
  <!-- Línea de tendencia alcista -->
  <polyline
    points="4,26 10,19 17,22 26,9"
    stroke="#10b981"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Punto destacado al final (máximo) -->
  <circle cx="26" cy="9" r="2.5" fill="#10b981"/>
  <!-- Brillo sutil en el punto -->
  <circle cx="26" cy="9" r="1" fill="#6ee7b7"/>
</svg>
